name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run phase scripts
        run: |
          chmod +x apply-hoteltv-phase1.sh apply-hoteltv-phase2.sh apply-hoteltv-phase3.sh apply-hoteltv-phase4.sh
          ./apply-hoteltv-phase1.sh
          ./apply-hoteltv-phase2.sh
          ./apply-hoteltv-phase3.sh
          ./apply-hoteltv-phase4.sh

      - name: Run smoke test explicitly
        run: |
          chmod +x tests/smoke.sh
          ./tests/smoke.sh
